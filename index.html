<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Reports Workers v159CH</title></head>
<body>
<h1>Reports Workers v159CH</h1>
<script>

function generateAccounting(monthName, year){
  const md = S.months[monthName] || {prev:[],cur:[]};
  const allRows = [...(md.prev||[]), ...(md.cur||[])];
  const workers = S.workers;
  const results = {};

  workers.forEach(w=>{
    results[w.name] = {vacation:0,sick:0,holiday:0,other:0,days:0,hours:0};
  });

  allRows.forEach(row=>{
    if(!row || !row.cells) return;
    workers.forEach(w=>{
      const val = row.cells[w.name];
      if(!val) return;

      if(val === 'חופש') results[w.name].vacation += 1;
      if(val === 'חצי חופש') results[w.name].vacation += 0.5;

      if(val === 'מחלה') results[w.name].sick += 1;
      if(val === 'חצי מחלה') results[w.name].sick += 0.5;

      if(val === 'חג' || val === 'אבל') results[w.name].holiday += 1;
      if(val === 'אחר') results[w.name].other += 1;

      if(!['חופש','חצי חופש','מחלה','חצי מחלה','חג','אבל'].includes(val)){
        results[w.name].days += 1;
        const daily = (window.DAILY_HOURS && DAILY_HOURS[w.name]) || window.DEFAULT_HOURS || 8;
        results[w.name].hours += daily;
      }
    });
  });

  return results;
}

</script>
<p>File generated.</p>
</body>
</html>
